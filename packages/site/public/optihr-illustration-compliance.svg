<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="comp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e4f8ed"/>
      <stop offset="100%" stop-color="#f5f2ed"/>
    </linearGradient>
    <linearGradient id="comp-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#053c43"/>
      <stop offset="100%" stop-color="#1e5056"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#comp-bg)"/>

  <!-- Subtle decorative circles -->
  <circle cx="700" cy="100" r="150" fill="#0d937c" opacity="0.05"/>
  <circle cx="100" cy="500" r="100" fill="#0d937c" opacity="0.05"/>

  <!-- === Scale of Justice === -->
  <!-- Base platform -->
  <rect x="330" y="430" width="140" height="14" rx="7" fill="#053c43"/>
  <rect x="355" y="444" width="90" height="10" rx="5" fill="#0d937c" opacity="0.5"/>
  <!-- Vertical pole -->
  <rect x="396" y="160" width="8" height="270" rx="4" fill="#053c43"/>
  <!-- Pivot circle -->
  <circle cx="400" cy="170" r="16" fill="#0d937c"/>
  <circle cx="400" cy="170" r="8" fill="#053c43"/>
  <!-- Horizontal beam -->
  <rect x="260" y="195" width="280" height="7" rx="3.5" fill="#053c43"/>

  <!-- Left chain (3 segments) -->
  <line x1="275" y1="202" x2="258" y2="250" stroke="#0d937c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="258" y1="250" x2="248" y2="298" stroke="#0d937c" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right chain -->
  <line x1="525" y1="202" x2="540" y2="250" stroke="#0d937c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="540" y1="250" x2="550" y2="298" stroke="#0d937c" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left pan (slightly higher - justice) -->
  <path d="M193 308 Q248 328 303 308" fill="#0d937c" opacity="0.15"/>
  <path d="M193 308 Q248 296 303 308" fill="none" stroke="#053c43" stroke-width="2.5"/>
  <!-- Left pan bottom curve -->
  <path d="M193 308 Q248 328 303 308" fill="none" stroke="#053c43" stroke-width="2.5"/>

  <!-- Right pan (slightly lower) -->
  <path d="M395 320 Q450 340 505 320" fill="#0d937c" opacity="0.15"/>
  <path d="M395 320 Q450 308 505 320" fill="none" stroke="#053c43" stroke-width="2.5"/>
  <path d="M395 320 Q450 340 505 320" fill="none" stroke="#053c43" stroke-width="2.5"/>

  <!-- === Documents on left (stacked) === -->
  <!-- Back document -->
  <rect x="88" y="190" width="130" height="165" rx="8" fill="#adeacb" stroke="#0d937c" stroke-width="1.5" transform="rotate(-6, 153, 272)"/>
  <!-- Middle document -->
  <rect x="96" y="182" width="130" height="165" rx="8" fill="#e4f8ed" stroke="#0d937c" stroke-width="1.5" transform="rotate(-2, 161, 264)"/>
  <!-- Front document (white) -->
  <rect x="98" y="176" width="130" height="165" rx="8" fill="white" stroke="#0d937c" stroke-width="2"/>
  <!-- Document lines -->
  <line x1="116" y1="208" x2="210" y2="208" stroke="#adeacb" stroke-width="2.5"/>
  <line x1="116" y1="224" x2="210" y2="224" stroke="#adeacb" stroke-width="2.5"/>
  <line x1="116" y1="240" x2="185" y2="240" stroke="#adeacb" stroke-width="2.5"/>
  <line x1="116" y1="256" x2="210" y2="256" stroke="#adeacb" stroke-width="2.5"/>
  <line x1="116" y1="272" x2="195" y2="272" stroke="#adeacb" stroke-width="2.5"/>
  <line x1="116" y1="288" x2="210" y2="288" stroke="#adeacb" stroke-width="2.5"/>
  <!-- Seal on doc -->
  <circle cx="163" cy="318" r="18" fill="#0d937c" opacity="0.15" stroke="#0d937c" stroke-width="2"/>
  <circle cx="163" cy="318" r="10" fill="#0d937c"/>
  <text x="163" y="323" font-family="sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">✓</text>

  <!-- === Checkmark badge (right side) === -->
  <!-- Shield shape -->
  <path d="M570 165 L650 165 L660 175 L660 250 Q660 290 615 320 Q570 290 540 250 L540 175 Z" fill="#053c43" opacity="0.08"/>
  <path d="M573 170 L647 170 L656 179 L656 248 Q656 285 615 314 Q574 285 544 248 L544 179 Z" fill="none" stroke="#0d937c" stroke-width="2.5"/>
  <!-- Checkmark inside shield -->
  <path d="M584 242 L607 265 L648 218" stroke="#0d937c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- === Info tag bottom right === -->
  <rect x="510" y="380" width="220" height="90" rx="14" fill="url(#comp-card)"/>
  <text x="620" y="413" font-family="sans-serif" font-size="11" font-weight="700" fill="#86f0a3" text-anchor="middle" letter-spacing="2">COMPLIANCE</text>
  <text x="620" y="433" font-family="sans-serif" font-size="12" fill="#adeacb" text-anchor="middle">Labour Law</text>
  <text x="620" y="453" font-family="sans-serif" font-size="12" fill="#adeacb" text-anchor="middle">Legal Protection</text>

  <!-- Dot accents -->
  <circle cx="460" cy="480" r="5" fill="#0d937c" opacity="0.3"/>
  <circle cx="480" cy="496" r="3.5" fill="#0d937c" opacity="0.2"/>
  <circle cx="450" cy="500" r="4" fill="#0d937c" opacity="0.25"/>
</svg>
