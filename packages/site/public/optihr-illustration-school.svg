<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sch-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f2ed"/>
      <stop offset="100%" stop-color="#e4f8ed"/>
    </linearGradient>
    <linearGradient id="sch-building" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e5056"/>
      <stop offset="100%" stop-color="#053c43"/>
    </linearGradient>
    <linearGradient id="sch-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#053c43"/>
      <stop offset="100%" stop-color="#1e5056"/>
    </linearGradient>
    <linearGradient id="sch-roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d937c"/>
      <stop offset="100%" stop-color="#053c43"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#sch-bg)"/>

  <!-- Soft accents -->
  <circle cx="680" cy="100" r="140" fill="#0d937c" opacity="0.05"/>
  <circle cx="120" cy="480" r="100" fill="#adeacb" opacity="0.15"/>

  <!-- Ground line -->
  <rect x="0" y="455" width="800" height="8" rx="4" fill="#0d937c" opacity="0.1"/>

  <!-- === School Building === -->
  <!-- Main body -->
  <rect x="230" y="280" width="340" height="175" rx="4" fill="url(#sch-building)"/>
  <!-- Lighter facade overlay -->
  <rect x="232" y="282" width="336" height="171" rx="3" fill="#1e5056" opacity="0.4"/>

  <!-- Roof / pediment -->
  <polygon points="210,280 400,175 590,280" fill="url(#sch-roof)"/>
  <!-- Pediment decoration line -->
  <polygon points="240,280 400,192 560,280" fill="none" stroke="#86f0a3" stroke-width="1.5" opacity="0.3"/>

  <!-- Columns -->
  <rect x="268" y="280" width="20" height="175" rx="10" fill="#053c43" opacity="0.6"/>
  <rect x="312" y="280" width="20" height="175" rx="10" fill="#053c43" opacity="0.5"/>
  <rect x="468" y="280" width="20" height="175" rx="10" fill="#053c43" opacity="0.5"/>
  <rect x="512" y="280" width="20" height="175" rx="10" fill="#053c43" opacity="0.6"/>

  <!-- Steps -->
  <rect x="270" y="455" width="260" height="12" rx="4" fill="#0d937c" opacity="0.3"/>
  <rect x="252" y="465" width="296" height="10" rx="4" fill="#0d937c" opacity="0.2"/>

  <!-- Central door -->
  <rect x="370" y="370" width="60" height="85" rx="6" fill="#053c43"/>
  <rect x="374" y="374" width="52" height="77" rx="4" fill="#032529"/>
  <!-- Door arch top -->
  <path d="M370 380 Q400 352 430 380" fill="#0d937c" opacity="0.3"/>
  <!-- Door knob -->
  <circle cx="382" cy="413" r="4" fill="#86f0a3" opacity="0.5"/>

  <!-- Windows (4 symmetrical) -->
  <rect x="248" y="310" width="52" height="58" rx="4" fill="#0d937c" opacity="0.25" stroke="#0d937c" stroke-width="1.5"/>
  <line x1="274" y1="310" x2="274" y2="368" stroke="#0d937c" stroke-width="1" opacity="0.4"/>
  <line x1="248" y1="339" x2="300" y2="339" stroke="#0d937c" stroke-width="1" opacity="0.4"/>

  <rect x="500" y="310" width="52" height="58" rx="4" fill="#0d937c" opacity="0.25" stroke="#0d937c" stroke-width="1.5"/>
  <line x1="526" y1="310" x2="526" y2="368" stroke="#0d937c" stroke-width="1" opacity="0.4"/>
  <line x1="500" y1="339" x2="552" y2="339" stroke="#0d937c" stroke-width="1" opacity="0.4"/>

  <!-- Smaller upper windows -->
  <rect x="320" y="310" width="40" height="44" rx="3" fill="#0d937c" opacity="0.2" stroke="#0d937c" stroke-width="1.5"/>
  <rect x="440" y="310" width="40" height="44" rx="3" fill="#0d937c" opacity="0.2" stroke="#0d937c" stroke-width="1.5"/>

  <!-- Flag / cupola on roof -->
  <rect x="396" y="140" width="4" height="36" fill="#053c43"/>
  <polygon points="400,140 428,150 400,160" fill="#0d937c"/>

  <!-- === Graduation Cap (floating, left) === -->
  <g transform="translate(68, 150)">
    <!-- Cap base (mortarboard) -->
    <ellipse cx="80" cy="62" rx="68" ry="20" fill="#053c43"/>
    <!-- Top flat -->
    <polygon points="12,62 80,30 148,62 80,94" fill="#0d937c"/>
    <!-- Center button -->
    <circle cx="80" cy="62" r="8" fill="#053c43"/>
    <!-- Tassel string -->
    <line x1="80" y1="62" x2="120" y2="72" stroke="#86f0a3" stroke-width="2"/>
    <!-- Tassel -->
    <circle cx="122" cy="76" r="8" fill="#86f0a3" opacity="0.7"/>
    <line x1="118" y1="84" x2="116" y2="108" stroke="#86f0a3" stroke-width="1.5" opacity="0.7"/>
    <line x1="122" y1="84" x2="122" y2="110" stroke="#86f0a3" stroke-width="1.5" opacity="0.7"/>
    <line x1="126" y1="84" x2="128" y2="108" stroke="#86f0a3" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- === Open Book (floating, right) === -->
  <g transform="translate(565, 160)">
    <!-- Left page -->
    <path d="M0 20 Q85 0 90 60 L90 130 Q85 170 0 150 Z" fill="white" stroke="#0d937c" stroke-width="2"/>
    <!-- Right page -->
    <path d="M180 20 Q95 0 90 60 L90 130 Q95 170 180 150 Z" fill="white" stroke="#0d937c" stroke-width="2"/>
    <!-- Spine -->
    <line x1="90" y1="0" x2="90" y2="150" stroke="#0d937c" stroke-width="3"/>
    <!-- Left page lines -->
    <line x1="16" y1="55" x2="80" y2="50" stroke="#adeacb" stroke-width="2"/>
    <line x1="14" y1="72" x2="80" y2="68" stroke="#adeacb" stroke-width="2"/>
    <line x1="14" y1="89" x2="80" y2="86" stroke="#adeacb" stroke-width="2"/>
    <line x1="14" y1="106" x2="62" y2="104" stroke="#adeacb" stroke-width="2"/>
    <!-- Right page lines -->
    <line x1="100" y1="50" x2="166" y2="55" stroke="#adeacb" stroke-width="2"/>
    <line x1="100" y1="68" x2="168" y2="72" stroke="#adeacb" stroke-width="2"/>
    <line x1="100" y1="86" x2="168" y2="89" stroke="#adeacb" stroke-width="2"/>
    <line x1="100" y1="104" x2="140" y2="106" stroke="#adeacb" stroke-width="2"/>
  </g>

  <!-- === Label card === -->
  <rect x="60" y="490" width="220" height="78" rx="12" fill="url(#sch-card)"/>
  <text x="170" y="516" font-family="sans-serif" font-size="11" font-weight="700" fill="#86f0a3" text-anchor="middle" letter-spacing="2">EDUCATION</text>
  <text x="170" y="536" font-family="sans-serif" font-size="12" fill="#adeacb" text-anchor="middle">Independent Schools</text>
  <text x="170" y="554" font-family="sans-serif" font-size="12" fill="#adeacb" text-anchor="middle">HR & Governance</text>

  <!-- Dot accents -->
  <circle cx="520" cy="490" r="5" fill="#0d937c" opacity="0.3"/>
  <circle cx="538" cy="506" r="3.5" fill="#0d937c" opacity="0.2"/>
  <circle cx="510" cy="510" r="4" fill="#0d937c" opacity="0.2"/>
</svg>
