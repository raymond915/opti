<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ai-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#032529"/>
      <stop offset="50%" stop-color="#053c43"/>
      <stop offset="100%" stop-color="#1e5056"/>
    </linearGradient>
    <linearGradient id="ai-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" id="ai-radial" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0d937c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d937c" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#86f0a3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d937c" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="600" fill="url(#ai-bg)"/>

  <!-- Subtle radial glow center -->
  <circle cx="400" cy="295" r="200" fill="#0d937c" opacity="0.06" filter="url(#blur-glow)"/>

  <!-- === Neural Network Connections (background layer) === -->
  <!-- Outer ring connections -->
  <line x1="195" y1="170" x2="355" y2="225" stroke="#0d937c" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="120" x2="355" y2="225" stroke="#0d937c" stroke-width="1" opacity="0.3"/>
  <line x1="605" y1="170" x2="445" y2="225" stroke="#0d937c" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="120" x2="445" y2="225" stroke="#0d937c" stroke-width="1" opacity="0.3"/>
  <line x1="155" y1="320" x2="355" y2="295" stroke="#0d937c" stroke-width="1" opacity="0.3"/>
  <line x1="645" y1="320" x2="445" y2="295" stroke="#0d937c" stroke-width="1" opacity="0.3"/>
  <line x1="195" y1="430" x2="355" y2="370" stroke="#0d937c" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="480" x2="355" y2="370" stroke="#0d937c" stroke-width="1" opacity="0.3"/>
  <line x1="605" y1="430" x2="445" y2="370" stroke="#0d937c" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="480" x2="445" y2="370" stroke="#0d937c" stroke-width="1" opacity="0.3"/>

  <!-- Inner connections to center -->
  <line x1="355" y1="225" x2="400" y2="295" stroke="#86f0a3" stroke-width="1.5" opacity="0.5"/>
  <line x1="445" y1="225" x2="400" y2="295" stroke="#86f0a3" stroke-width="1.5" opacity="0.5"/>
  <line x1="355" y1="295" x2="400" y2="295" stroke="#86f0a3" stroke-width="1.5" opacity="0.5"/>
  <line x1="445" y1="295" x2="400" y2="295" stroke="#86f0a3" stroke-width="1.5" opacity="0.5"/>
  <line x1="355" y1="370" x2="400" y2="295" stroke="#86f0a3" stroke-width="1.5" opacity="0.5"/>
  <line x1="445" y1="370" x2="400" y2="295" stroke="#86f0a3" stroke-width="1.5" opacity="0.5"/>

  <!-- Cross connections mid-layer -->
  <line x1="355" y1="225" x2="445" y2="295" stroke="#0d937c" stroke-width="1" opacity="0.25"/>
  <line x1="445" y1="225" x2="355" y2="295" stroke="#0d937c" stroke-width="1" opacity="0.25"/>
  <line x1="355" y1="295" x2="445" y2="370" stroke="#0d937c" stroke-width="1" opacity="0.25"/>
  <line x1="445" y1="295" x2="355" y2="370" stroke="#0d937c" stroke-width="1" opacity="0.25"/>

  <!-- === Nodes - outer ring (input layer) === -->
  <!-- Top -->
  <circle cx="400" cy="120" r="12" fill="#1e5056" stroke="#0d937c" stroke-width="2"/>
  <circle cx="400" cy="120" r="5" fill="#86f0a3"/>
  <!-- Top-left -->
  <circle cx="195" cy="170" r="10" fill="#1e5056" stroke="#0d937c" stroke-width="1.5"/>
  <circle cx="195" cy="170" r="4" fill="#0d937c"/>
  <!-- Top-right -->
  <circle cx="605" cy="170" r="10" fill="#1e5056" stroke="#0d937c" stroke-width="1.5"/>
  <circle cx="605" cy="170" r="4" fill="#0d937c"/>
  <!-- Left -->
  <circle cx="155" cy="320" r="10" fill="#1e5056" stroke="#0d937c" stroke-width="1.5"/>
  <circle cx="155" cy="320" r="4" fill="#0d937c"/>
  <!-- Right -->
  <circle cx="645" cy="320" r="10" fill="#1e5056" stroke="#0d937c" stroke-width="1.5"/>
  <circle cx="645" cy="320" r="4" fill="#0d937c"/>
  <!-- Bottom-left -->
  <circle cx="195" cy="430" r="10" fill="#1e5056" stroke="#0d937c" stroke-width="1.5"/>
  <circle cx="195" cy="430" r="4" fill="#0d937c"/>
  <!-- Bottom-right -->
  <circle cx="605" cy="430" r="10" fill="#1e5056" stroke="#0d937c" stroke-width="1.5"/>
  <circle cx="605" cy="430" r="4" fill="#0d937c"/>
  <!-- Bottom -->
  <circle cx="400" cy="480" r="12" fill="#1e5056" stroke="#0d937c" stroke-width="2"/>
  <circle cx="400" cy="480" r="5" fill="#86f0a3"/>

  <!-- === Hidden layer nodes === -->
  <circle cx="355" cy="225" r="14" fill="#053c43" stroke="#0d937c" stroke-width="2"/>
  <circle cx="355" cy="225" r="6" fill="#0d937c"/>
  <circle cx="445" cy="225" r="14" fill="#053c43" stroke="#0d937c" stroke-width="2"/>
  <circle cx="445" cy="225" r="6" fill="#0d937c"/>
  <circle cx="355" cy="295" r="14" fill="#053c43" stroke="#0d937c" stroke-width="2"/>
  <circle cx="355" cy="295" r="6" fill="#0d937c"/>
  <circle cx="445" cy="295" r="14" fill="#053c43" stroke="#0d937c" stroke-width="2"/>
  <circle cx="445" cy="295" r="6" fill="#0d937c"/>
  <circle cx="355" cy="370" r="14" fill="#053c43" stroke="#0d937c" stroke-width="2"/>
  <circle cx="355" cy="370" r="6" fill="#0d937c"/>
  <circle cx="445" cy="370" r="14" fill="#053c43" stroke="#0d937c" stroke-width="2"/>
  <circle cx="445" cy="370" r="6" fill="#0d937c"/>

  <!-- === Center node (output / brain) === -->
  <circle cx="400" cy="295" r="36" fill="#0d937c" opacity="0.15"/>
  <circle cx="400" cy="295" r="28" fill="#053c43" stroke="#86f0a3" stroke-width="2.5"/>
  <circle cx="400" cy="295" r="14" fill="#0d937c"/>
  <circle cx="394" cy="289" r="5" fill="white" opacity="0.3"/>

  <!-- === Human profile silhouette (top-right quadrant) === -->
  <g opacity="0.18" transform="translate(590, 80)">
    <circle cx="50" cy="30" r="22" fill="#86f0a3"/>
    <path d="M10 90 Q10 58 50 58 Q90 58 90 90" fill="#86f0a3"/>
  </g>

  <!-- === Label card === -->
  <rect x="270" y="524" width="260" height="54" rx="12" fill="#032529" stroke="#0d937c" stroke-width="1.5"/>
  <text x="400" y="547" font-family="sans-serif" font-size="11" font-weight="700" fill="#86f0a3" text-anchor="middle" letter-spacing="2">AI STRATEGY</text>
  <text x="400" y="565" font-family="sans-serif" font-size="11" fill="#adeacb" text-anchor="middle">Workforce Intelligence</text>

  <!-- Floating data points -->
  <rect x="80" y="210" width="32" height="18" rx="4" fill="#0d937c" opacity="0.2"/>
  <text x="96" y="223" font-family="monospace" font-size="9" fill="#86f0a3" opacity="0.6" text-anchor="middle">01</text>
  <rect x="685" y="240" width="32" height="18" rx="4" fill="#0d937c" opacity="0.2"/>
  <text x="701" y="253" font-family="monospace" font-size="9" fill="#86f0a3" opacity="0.6" text-anchor="middle">AI</text>
  <rect x="80" y="380" width="40" height="18" rx="4" fill="#0d937c" opacity="0.2"/>
  <text x="100" y="393" font-family="monospace" font-size="9" fill="#86f0a3" opacity="0.6" text-anchor="middle">HR</text>
  <rect x="680" y="380" width="40" height="18" rx="4" fill="#0d937c" opacity="0.2"/>
  <text x="700" y="393" font-family="monospace" font-size="9" fill="#86f0a3" opacity="0.6" text-anchor="middle">10</text>
</svg>
