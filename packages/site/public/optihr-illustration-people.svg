<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ppl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f2ed"/>
      <stop offset="100%" stop-color="#e4f8ed"/>
    </linearGradient>
    <linearGradient id="ppl-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#053c43"/>
      <stop offset="100%" stop-color="#1e5056"/>
    </linearGradient>
    <linearGradient id="ppl-center" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d937c"/>
      <stop offset="100%" stop-color="#1e5056"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#ppl-bg)"/>

  <!-- Soft background circles for depth -->
  <circle cx="400" cy="300" r="240" fill="#0d937c" opacity="0.04"/>
  <circle cx="400" cy="300" r="180" fill="#0d937c" opacity="0.04"/>
  <circle cx="400" cy="300" r="120" fill="#0d937c" opacity="0.04"/>

  <!-- Decorative arcs -->
  <circle cx="730" cy="60" r="120" fill="#adeacb" opacity="0.12"/>
  <circle cx="70" cy="540" r="90" fill="#0d937c" opacity="0.07"/>

  <!-- === Center Person (lead figure) === -->
  <!-- Body -->
  <ellipse cx="400" cy="430" rx="48" ry="28" fill="#0d937c" opacity="0.15"/>
  <rect x="368" y="342" width="64" height="80" rx="32" fill="url(#ppl-center)"/>
  <!-- Head -->
  <circle cx="400" cy="300" r="46" fill="url(#ppl-center)"/>
  <!-- Highlight on head -->
  <ellipse cx="388" cy="285" rx="16" ry="10" fill="white" opacity="0.15"/>
  <!-- Collar -->
  <path d="M377 388 L400 368 L423 388" fill="white" opacity="0.25"/>

  <!-- === Left Person === -->
  <ellipse cx="230" cy="440" rx="38" ry="22" fill="#1e5056" opacity="0.12"/>
  <rect x="204" y="366" width="52" height="68" rx="26" fill="#1e5056"/>
  <circle cx="230" cy="328" r="38" fill="#1e5056"/>
  <ellipse cx="220" cy="315" rx="12" ry="8" fill="white" opacity="0.1"/>
  <!-- Collar left -->
  <path d="M210 390 L230 374 L250 390" fill="white" opacity="0.2"/>

  <!-- === Right Person === -->
  <ellipse cx="570" cy="440" rx="38" ry="22" fill="#1e5056" opacity="0.12"/>
  <rect x="544" y="366" width="52" height="68" rx="26" fill="#1e5056"/>
  <circle cx="570" cy="328" r="38" fill="#1e5056"/>
  <ellipse cx="560" cy="315" rx="12" ry="8" fill="white" opacity="0.1"/>
  <path d="M550 390 L570 374 L590 390" fill="white" opacity="0.2"/>

  <!-- === Far Left Person (smaller, back) === -->
  <ellipse cx="110" cy="440" rx="28" ry="16" fill="#053c43" opacity="0.1"/>
  <rect x="91" y="382" width="38" height="52" rx="19" fill="#053c43" opacity="0.7"/>
  <circle cx="110" cy="356" r="28" fill="#053c43" opacity="0.7"/>

  <!-- === Far Right Person (smaller, back) === -->
  <ellipse cx="690" cy="440" rx="28" ry="16" fill="#053c43" opacity="0.1"/>
  <rect x="671" y="382" width="38" height="52" rx="19" fill="#053c43" opacity="0.7"/>
  <circle cx="690" cy="356" r="28" fill="#053c43" opacity="0.7"/>

  <!-- === Connecting arcs between people === -->
  <!-- Center to left -->
  <path d="M355 350 Q295 310 268 328" fill="none" stroke="#0d937c" stroke-width="2" stroke-dasharray="6,5" opacity="0.5"/>
  <!-- Center to right -->
  <path d="M445 350 Q505 310 532 328" fill="none" stroke="#0d937c" stroke-width="2" stroke-dasharray="6,5" opacity="0.5"/>
  <!-- Left to far-left -->
  <path d="M195 350 Q155 330 138 348" fill="none" stroke="#1e5056" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.4"/>
  <!-- Right to far-right -->
  <path d="M605 350 Q645 330 662 348" fill="none" stroke="#1e5056" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.4"/>

  <!-- Connection nodes (dots at midpoints) -->
  <circle cx="310" cy="318" r="6" fill="#0d937c" opacity="0.5"/>
  <circle cx="490" cy="318" r="6" fill="#0d937c" opacity="0.5"/>
  <circle cx="165" cy="340" r="4" fill="#1e5056" opacity="0.5"/>
  <circle cx="635" cy="340" r="4" fill="#1e5056" opacity="0.5"/>

  <!-- === Info card === -->
  <rect x="300" y="490" width="200" height="72" rx="12" fill="url(#ppl-card)"/>
  <text x="400" y="518" font-family="sans-serif" font-size="11" font-weight="700" fill="#86f0a3" text-anchor="middle" letter-spacing="2">PEOPLE</text>
  <text x="400" y="538" font-family="sans-serif" font-size="12" fill="#adeacb" text-anchor="middle">Workforce Strategy</text>
  <text x="400" y="555" font-family="sans-serif" font-size="12" fill="#adeacb" text-anchor="middle">& Change Management</text>

  <!-- Subtle dots -->
  <circle cx="160" cy="200" r="5" fill="#0d937c" opacity="0.3"/>
  <circle cx="175" cy="218" r="3.5" fill="#0d937c" opacity="0.2"/>
  <circle cx="640" cy="180" r="4" fill="#0d937c" opacity="0.25"/>
  <circle cx="658" cy="198" r="3" fill="#0d937c" opacity="0.2"/>
</svg>
